<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lumina Shot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; font-family: 'Pixelify Sans', sans-serif; touch-action: none; }
#gameWrapper { position: relative; width: 540px; height: 800px; max-width: 100vw; max-height: 100vh; box-sizing: border-box; }
@media (max-width: 540px) { #gameWrapper { width: 100vw; height: 148.15vw; } }
canvas { width: 100%; height: 100%; background: #000; border: 2px solid #555; box-sizing: border-box; touch-action: none; }
#ui-container { display: none; position: absolute; bottom: 30px; right: 20px; left: unset !important; width: 70px; flex-direction: column; align-items: center; gap: 20px; pointer-events: none; z-index: 10; }
.touch-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.5); color: white; font-weight: bold; font-size: 14px; display: flex; justify-content: center; align-items: center; pointer-events: auto; user-select: none; touch-action: none; }
</style>
</head>
<body>
<div id="gameWrapper">
    <canvas id="gameCanvas" width="540" height="800"></canvas>
    <div id="ui-container">
        <div id="btnBomb" class="touch-btn">ビーム</div>
        <div id="btnSlow" class="touch-btn">低速</div>
    </div>
</div>
<script>
// ミュート状態を管理する変数
let isMuted = false;

// === 極彩追加ここから ===
let allPracticeCleared = false;
let noHitAllClear = false;
let isGokusaiBattle = false;
let gokusaiBosses = [];
let reflectWalls = [];
let gokusaiDefeated = false;
let gokusaiBeams = [];
let gokusaiState = {};
// === 極彩追加ここまで ===

let audioCtx, noiseBuffer, lastBurstTime = 0, lastGrazeSeTime = 0;

// Chromeなどのオートプレイポリシー対策として resume を待機
async function initAudio() { 
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') {
        await audioCtx.resume(); 
    }
    if (!noiseBuffer) {
        const bufferSize = audioCtx.sampleRate * 2.0;
        noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1; 
    }
}

function playSE(type, param = null) {
    if (isMuted || !audioCtx) return;
    
    const now = audioCtx.currentTime;
    if (type === 'playerBeam') {
        const nSrc = audioCtx.createBufferSource(); nSrc.buffer = noiseBuffer;
        const nFilter = audioCtx.createBiquadFilter(); nFilter.type = 'lowpass'; nFilter.frequency.setValueAtTime(1500, now); nFilter.frequency.exponentialRampToValueAtTime(100, now + 1.5);
        const nGain = audioCtx.createGain(); nGain.gain.setValueAtTime(0.6, now); nGain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
        nSrc.connect(nFilter); nFilter.connect(nGain); nGain.connect(audioCtx.destination); nSrc.start(now); nSrc.stop(now + 1.5);
        const osc = audioCtx.createOscillator(), oscGain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now); osc.frequency.linearRampToValueAtTime(40, now + 1.0);
        oscGain.gain.setValueAtTime(0.4, now); oscGain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
        osc.connect(oscGain); oscGain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 1.0);
        return;
    }
    if (type === 'phaseChange') {
        const pOsc1 = audioCtx.createOscillator(), pOsc2 = audioCtx.createOscillator(), pGain = audioCtx.createGain();
        pOsc1.type = 'square'; pOsc2.type = 'sawtooth';
        pOsc1.frequency.setValueAtTime(300, now); pOsc1.frequency.exponentialRampToValueAtTime(800, now + 0.3);
        pOsc2.frequency.setValueAtTime(424, now); pOsc2.frequency.exponentialRampToValueAtTime(1131, now + 0.3);
        pGain.gain.setValueAtTime(0, now); pGain.gain.linearRampToValueAtTime(0.15, now + 0.05); pGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        pOsc1.connect(pGain); pOsc2.connect(pGain); pGain.connect(audioCtx.destination); pOsc1.start(now); pOsc2.start(now); pOsc1.stop(now + 0.5); pOsc2.stop(now + 0.5);
        return;
    }
    if (type === 'phase5Change') {
        const oscA = audioCtx.createOscillator(), oscB = audioCtx.createOscillator(), gainA = audioCtx.createGain();
        oscA.type = 'sawtooth'; oscB.type = 'sawtooth';
        oscA.frequency.setValueAtTime(150, now); oscA.frequency.exponentialRampToValueAtTime(20, now + 2.0);
        oscB.frequency.setValueAtTime(155, now); oscB.frequency.exponentialRampToValueAtTime(22, now + 2.0);
        gainA.gain.setValueAtTime(0.4, now); gainA.gain.linearRampToValueAtTime(0.5, now + 0.5); gainA.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
        oscA.connect(gainA); oscB.connect(gainA); gainA.connect(audioCtx.destination); oscA.start(now); oscB.start(now); oscA.stop(now + 2.0); oscB.stop(now + 2.0);
        const qSrc = audioCtx.createBufferSource(); qSrc.buffer = noiseBuffer;
        const qFilter = audioCtx.createBiquadFilter(); qFilter.type = 'lowpass'; qFilter.frequency.setValueAtTime(300, now); qFilter.frequency.linearRampToValueAtTime(50, now + 2.0);
        const qGain = audioCtx.createGain(); qGain.gain.setValueAtTime(0.6, now); qGain.gain.exponentialRampToValueAtTime(0.01, now + 2.0);
        qSrc.connect(qFilter); qFilter.connect(qGain); qGain.connect(audioCtx.destination); qSrc.start(now); qSrc.stop(now + 2.0);
        return;
    }
    if (type === 'enemyBurst') {
        if (now - lastBurstTime < 0.2) return;
        lastBurstTime = now; let count = param || 3; 
        for(let i = 0; i < count; i++) {
            let t = now + i * 0.05; const nSrc = audioCtx.createBufferSource(); nSrc.buffer = noiseBuffer;
            const nFilter = audioCtx.createBiquadFilter(); nFilter.type = 'highpass'; nFilter.frequency.value = 800; 
            const nGain = audioCtx.createGain(); nGain.gain.setValueAtTime(0.08, t); nGain.gain.exponentialRampToValueAtTime(0.005, t + 0.04);
            nSrc.connect(nFilter); nFilter.connect(nGain); nGain.connect(audioCtx.destination); nSrc.start(t); nSrc.stop(t + 0.04);
        }
        return;
    }
    if (type === 'playerHit') {
        const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
        gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.4);
        const pNoiseSrc = audioCtx.createBufferSource(); pNoiseSrc.buffer = noiseBuffer;
        const pNoiseFilter = audioCtx.createBiquadFilter(); pNoiseFilter.type = 'lowpass'; pNoiseFilter.frequency.setValueAtTime(2000, now); pNoiseFilter.frequency.exponentialRampToValueAtTime(100, now + 0.3);
        const pNoiseGain = audioCtx.createGain(); pNoiseGain.gain.setValueAtTime(0.3, now); pNoiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        pNoiseSrc.connect(pNoiseFilter); pNoiseFilter.connect(pNoiseGain); pNoiseGain.connect(audioCtx.destination); pNoiseSrc.start(now); pNoiseSrc.stop(now + 0.3);
        return;
    }
    if (type === 'graze') {
        if (now - lastGrazeSeTime < 0.04) return; 
        lastGrazeSeTime = now;
        const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(3000, now); osc.frequency.exponentialRampToValueAtTime(1000, now + 0.05);
        gainNode.gain.setValueAtTime(0.03, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.05);
        return;
    }

    const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
    switch(type) {
        case 'playerShot': osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1); gainNode.gain.setValueAtTime(0.02, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1); osc.start(now); osc.stop(now + 0.1); break;
        case 'enemyBeam': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.3); gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4); osc.start(now); osc.stop(now + 0.4); break;
        case 'warning': osc.type = 'sine'; osc.frequency.setValueAtTime(2500, now); osc.frequency.exponentialRampToValueAtTime(1500, now + 0.1); gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15); osc.start(now); osc.stop(now + 0.15); break;
        case 'hit': osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.05); gainNode.gain.setValueAtTime(0.015, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05); osc.start(now); osc.stop(now + 0.05); break;
        case 'homingSpawn': osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.6); gainNode.gain.setValueAtTime(0, now); gainNode.gain.linearRampToValueAtTime(0.5, now + 0.05); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.6); osc.start(now); osc.stop(now + 0.6); break;
        case 'gameover': osc.type = 'square'; osc.frequency.setValueAtTime(523.25, now); gainNode.gain.setValueAtTime(0, now); gainNode.gain.linearRampToValueAtTime(0.15, now + 0.05); gainNode.gain.linearRampToValueAtTime(0.15, now + 0.4); gainNode.gain.linearRampToValueAtTime(0.001, now + 0.45); osc.frequency.setValueAtTime(349.23, now + 0.5); osc.frequency.exponentialRampToValueAtTime(100, now + 1.5); gainNode.gain.setValueAtTime(0, now + 0.5); gainNode.gain.linearRampToValueAtTime(0.15, now + 0.55); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5); osc.start(now); osc.stop(now + 1.5); break;
    }
}

let bgmNormal = new Audio('https://raw.githubusercontent.com/Se-8a/Lumina-Shot/main/music/1_2_3_4.ogg');
let bgmGokuen = new Audio('https://raw.githubusercontent.com/Se-8a/Lumina-Shot/main/music/Gokuen.ogg');
let bgmPause = new Audio('https://raw.githubusercontent.com/Se-8a/Lumina-Shot/main/music/Pause.ogg');
let currentBgm = null;
let previousBgm = null;

let loadingTotal = 3; 
let loadingCount = 0;
let loadingComplete = false;
let gameState = 'loading';

function setupBgmLoop(bgm) {
    bgm.loop = false;
    bgm.addEventListener('ended', () => {
        bgm.currentTime = 0;
        bgm.play().catch(e => console.log("BGMループ再生失敗:", e));
    });
}
setupBgmLoop(bgmNormal);
setupBgmLoop(bgmGokuen);
setupBgmLoop(bgmPause);

function onBgmLoaded() {
    loadingCount++;
    if (loadingCount >= loadingTotal) {
        loadingComplete = true;
    }
}

bgmNormal.addEventListener('canplaythrough', onBgmLoaded);
bgmGokuen.addEventListener('canplaythrough', onBgmLoaded);
bgmPause.addEventListener('canplaythrough', onBgmLoaded);
bgmNormal.addEventListener('error', onBgmLoaded);
bgmGokuen.addEventListener('error', onBgmLoaded);
bgmPause.addEventListener('error', onBgmLoaded);

async function playBGMForPhase(phase) {
    await initAudio(); 
    if (isMuted) return; 

    if (phase !== 5 && currentBgm === bgmNormal) {
        return; 
    }

    if (currentBgm) {
        currentBgm.pause();
        currentBgm.currentTime = 0;
    }
    let bgm;
    if (phase === 5) {
        bgm = bgmGokuen;
    } else {
        bgm = bgmNormal;
    }
    bgm.volume = 0.15;
    bgm.play().catch(e => console.log("BGM再生失敗:", e));
    currentBgm = bgm;
}

async function playPauseBGM() {
    await initAudio(); 
    if (isMuted) return; 

    if (currentBgm === bgmPause) return;
    
    if (currentBgm) {
        currentBgm.pause();
        previousBgm = currentBgm;
        currentBgm = null;
    }
    bgmPause.volume = 0.1;
    bgmPause.play().catch(e => console.log("ポーズBGM再生失敗:", e));
    currentBgm = bgmPause;
}

async function resumeBGM() {
    await initAudio();
    if (isMuted) return; 
    
    if (currentBgm === bgmPause) {
        bgmPause.pause();
        bgmPause.currentTime = 0;
        currentBgm = null;
    }
    if (previousBgm) {
        previousBgm.play().catch(e => console.log("BGM再開失敗:", e));
        currentBgm = previousBgm;
        previousBgm = null;
    } else {
        let phase = isGokusaiBattle ? 5 : getBossPhase();
        await playBGMForPhase(phase);
    }
}

function stopBGM() {
    if (currentBgm) {
        currentBgm.pause();
        currentBgm.currentTime = 0;
        currentBgm = null;
    }
    if (previousBgm) {
        previousBgm = null;
    }
    bgmNormal.pause();
    bgmNormal.currentTime = 0;
    bgmGokuen.pause();
    bgmGokuen.currentTime = 0;
    bgmPause.pause();
    bgmPause.currentTime = 0;
}

async function toggleMute() {
    isMuted = !isMuted;
    if (isMuted) {
        stopBGM();
    } else {
        if (gameState === 'playing') {
            await playBGMForPhase(isGokusaiBattle ? 5 : getBossPhase());
        } else if (gameState !== 'loading') {
            await playPauseBGM();
        }
    }
}

const CONFIG = {
    width: 540, height: 800, debug: false, 
    player: { speed: 180, slowSpeed: 60, size: 4, hitboxRadius: 1.5, health: 5, invincibleDuration: 1500, healInterval: 10000, autoHealAmount: 1, autoHealLimit: 5, shotInterval: 334, bulletSpeed: 750, bulletDamage: 3, beamActiveDuration: 1000, beamInvincibleDuration: 3000, beamWidth: 60, beamCoreWidth: 20, beamDamage: 60, energyChargeTime: 20, energyHitRecover: 5, homingStrength: 800, homingRangeX: 60, homingRangeY: 150, grazeRange: 12, grazeEnergyRecover: 1.25 },
    enemy: { x: 270, y: 100, health: 500, maxHealth: 500, size: 10, hitboxRadius: 20, shotInterval: 220, bulletWaveCount: 35, beamCooldown: 4000, beamWarningDuration: 300, beamActiveDuration: 1000, beamWidth: 60, beamWarningWidth: 2, beamCollisionWidth: 30, regenInterval: 3000, regenAmount: 2 },
    ui: { buttonWidth: 160, buttonHeight: 50, menuButtonY: 290, practiceButtonY: 360, debugButtonY: 430, breakButtonY: 500, pauseBtnX: 480, pauseBtnY: 55, pauseBtnSize: 36, pauseResumptionY: 330, pauseRestartY: 400, pauseMenuY: 470, clearButtonY: 420 },
    joystick: { maxDistance: 50 }
};

let bgStars = [], bgClouds = [];
for(let i = 0; i < 150; i++) {
    bgStars.push({
        x: Math.random() * CONFIG.width,
        y: Math.random() * CONFIG.height,
        size: Math.random() < 0.8 ? Math.random() * 1.5 : Math.random() * 2 + 1.5,
        speed: Math.random() < 0.8 ? Math.random() * 20 + 10 : Math.random() * 50 + 30,
        color: `hsl(${Math.random() * 60 + 200}, 100%, ${Math.random() * 40 + 60}%)`
    });
}
for(let i = 0; i < 15; i++) {
    bgClouds.push({
        x: Math.random() * CONFIG.width,
        y: Math.random() * CONFIG.height,
        w: Math.random() * 80 + 40,
        h: Math.random() * 30 + 15,
        speed: Math.random() * 100 + 80,
        opacity: Math.random() * 0.08 + 0.02
    });
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameTime = 0, lastHitSeTime = 0, score = 0, isPhaseNoHit = true, continuousNoHitPhases = 0, practicePhase = null; 
let enemy = { x: CONFIG.enemy.x, y: CONFIG.enemy.y, health: CONFIG.enemy.health, maxHealth: CONFIG.enemy.health, lastSpawn: 0, lastHomingSpawn: 0, lastRegenTime: 0 }; 
let badges = { practice: { 1: null, 2: null, 3: null, 4: null, 5: null }, boss: null, gokusai: null };

let scoreHistory = [];

function loadScoreHistory() {
    try {
        let data = localStorage.getItem('touhou_score_history');
        if (data) scoreHistory = JSON.parse(data);
    } catch(e) {}
}

function saveScoreToHistory(newScore) {
    if (practicePhase !== null || player.isTestMode || CONFIG.debug || isGokusaiBattle) return;
    scoreHistory.push({ score: newScore, time: Date.now() });
    if (scoreHistory.length > 10) scoreHistory.shift(); 
    try {
        localStorage.setItem('touhou_score_history', JSON.stringify(scoreHistory));
    } catch(e) {}
}

function getScoreData() {
    let best = 0;
    let recent = [];
    if (scoreHistory.length > 0) {
        best = Math.max(...scoreHistory.map(h => h.score));
        recent = scoreHistory.slice(-3).reverse().map(h => h.score);
    }
    return { best, recent };
}

loadScoreHistory(); 

function loadBadges() {
    try {
        let pData = localStorage.getItem('touhou_practice_badges2'); if (pData) badges.practice = JSON.parse(pData);
        let bData = localStorage.getItem('touhou_boss_badge2'); if (bData) badges.boss = bData;
        let gData = localStorage.getItem('touhou_gokusai_badge'); if (gData) badges.gokusai = gData;
        let gdData = localStorage.getItem('touhou_gokusai_defeated'); if (gdData) gokusaiDefeated = JSON.parse(gdData);
    } catch(e) {}

    let clearCount = 0;
    let noHitCount = 0;
    for (let i = 1; i <= 5; i++) {
        if (badges.practice[i] === "red" || badges.practice[i] === "purple") clearCount++;
        if (badges.practice[i] === "purple") noHitCount++;
    }
    allPracticeCleared = (clearCount === 5);
    noHitAllClear = (noHitCount === 5);
}
function saveBadges() {
    try {
        localStorage.setItem('touhou_practice_badges2', JSON.stringify(badges.practice));
        localStorage.setItem('touhou_boss_badge2', badges.boss || "");
        localStorage.setItem('touhou_gokusai_badge', badges.gokusai || "");
        localStorage.setItem('touhou_gokusai_defeated', JSON.stringify(gokusaiDefeated));
    } catch(e) {}
}
function clearAllBadges() {
    if (confirm("全ての実績を削除しますか？")) {
        badges = { practice: { 1: null, 2: null, 3: null, 4: null, 5: null }, boss: null, gokusai: null };
        allPracticeCleared = false; noHitAllClear = false; gokusaiDefeated = false;
        saveBadges();
    }
}
loadBadges();

let player = { x: 270, y: 680, speed: CONFIG.player.speed, slowSpeed: CONFIG.player.slowSpeed, isSlow: false, size: 4, health: 5, invincible: false, invTime: 0, energy: 0, lastHitTime: 0, isTestMode: false, graze: 0 };
let bullets = [], playerBullets = [], keys = {}, lastShotTime = 0, grazeParticles = [], floatTexts = [];
let beam = { state: 'idle', angle: Math.PI / 2, originX: 270, originY: CONFIG.enemy.y, startTime: 0, lastTrigger: 0 };
let playerBeam = { active: false, startTime: 0 };
let joystick = { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, maxDistance: CONFIG.joystick.maxDistance };
let joystickTouchId = null, touchSlowMode = false, isTouchDevice = false, lastUiClickTime = 0, lastTime = 0, accumulator = 0, currentBossPhase = 1, flashOpacity = 0.0;

function drawBadge(x, y, colorCode) {
    ctx.save(); ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2);
    if (colorCode === "rainbow") {
        let grad = ctx.createLinearGradient(x-10, y-10, x+10, y+10);
        grad.addColorStop(0, "red"); grad.addColorStop(0.2, "orange"); grad.addColorStop(0.4, "yellow"); grad.addColorStop(0.6, "green"); grad.addColorStop(0.8, "blue"); grad.addColorStop(1, "purple");
        ctx.fillStyle = grad;
    } else {
        ctx.fillStyle = colorCode === "purple" ? "#a333ff" : "#ff3333"; 
    }
    ctx.fill();
    ctx.strokeStyle = "gold"; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
}

function handleGameClear() {
    addScore(player.health * 3000);
    let isGamePerfectNoHit = false;
    if (isPhaseNoHit) {
        continuousNoHitPhases++;
        let noHitBonus = 0;
        if (continuousNoHitPhases === 5) { noHitBonus = 100000000; isGamePerfectNoHit = true; } 
        else { const bonuses = { 1: 20000, 2: 30000, 3: 40000, 4: 60000 }; noHitBonus = bonuses[continuousNoHitPhases] || 0; }
        addScore(noHitBonus);
    }
    
    if (!player.isTestMode && !CONFIG.debug) {
        if (practicePhase !== null) {
            let currentBadge = badges.practice[practicePhase];
            let newBadge = isPhaseNoHit ? "purple" : "red";
            if (currentBadge !== "purple") badges.practice[practicePhase] = newBadge;
        } else {
            let newBadge = (isPhaseNoHit && isGamePerfectNoHit) ? "purple" : "red";
            if (badges.boss !== "purple") badges.boss = newBadge;
        }
        saveBadges(); 
        loadBadges(); 
    }
    
    saveScoreToHistory(score); 
    setGameState('clear'); 
}

function handleGokusaiClear() {
    if (!player.isTestMode && !CONFIG.debug) {
        badges.gokusai = "rainbow";
        gokusaiDefeated = true;
        saveBadges();
    }
    setGameState('clear');
}

function resetGokusaiGame(isTestMode = false) {
    practicePhase = null;
    gameTime = 0; lastHitSeTime = 0; lastBurstTime = 0; lastGrazeSeTime = 0; score = 0; isPhaseNoHit = true; continuousNoHitPhases = 0;
    
    player.health = noHitAllClear ? 10 : 5;
    player.x = CONFIG.width / 2; player.y = 680; 
    player.invincible = isTestMode; player.isTestMode = isTestMode; 
    player.energy = 0; player.graze = 0; player.lastHitTime = 0; 
    playerBeam.active = false; playerBeam.startTime = 0;
    
    gokusaiBosses = [{ id: 0, x: CONFIG.width / 2, y: 100, health: 400, maxHealth: 400, type: 'gokusai' }];
    reflectWalls = [];
    gokusaiBeams = [];
    bullets = []; playerBullets = []; grazeParticles = []; floatTexts = []; keys = {};

function createEnemyBullet(x, y, angle, speed, hue, size = null) {
    bullets.push({ x: x, y: y, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed, size: size ? size : (Math.random() * 3 + 4), color: `hsl(${hue + (Math.random() * 30 - 15)}, 100%, 60%)`, grazed: false });
}

function spawnGrazeEffect(x, y) {

}

function spawnBullets(spawnX) {
    const phase = getBossPhase(), time = gameTime / 200;
    let speedMultiplier = 1.0, hueBase = 200; 
    if (phase === 1) { speedMultiplier = 1.0; hueBase = 200; } else if (phase === 2) { speedMultiplier = 1.2; hueBase = 120; } else if (phase === 3) { speedMultiplier = 1.4; hueBase = 60; } else if (phase === 4) { speedMultiplier = 1.6; hueBase = 30; } else if (phase === 5) { speedMultiplier = 1.33; hueBase = 0; }
    let count2 = phase === 5 ? 34 : CONFIG.enemy.bulletWaveCount; 

    if (phase === 1) {
        let phase1Count = Math.floor(count2 * 0.40);
        for (let i = 0; i < phase1Count; i++) { let angle = (i * Math.PI * 2 / phase1Count) + time; createEnemyBullet(spawnX, enemy.y, angle, 96 * speedMultiplier, hueBase); }
        if (Math.random() < 0.25) { let angle = Math.atan2(player.y - enemy.y, player.x - enemy.x); createEnemyBullet(spawnX, enemy.y, angle, 120 * speedMultiplier, hueBase, 6); }
    } else if (phase === 2) {
        for (let i = 0; i < count2; i++) { let angle = (i * Math.PI * 2 / count2); let speed = (72 + Math.random() * 60) * speedMultiplier; createEnemyBullet(spawnX, enemy.y, angle, speed, hueBase); }
        for (let i = 0; i < 1; i++) { let rx = spawnX + (Math.random() * 80 - 40); bullets.push({ x: rx, y: enemy.y, dx: 0, dy: 150 * speedMultiplier, size: 4, color: `hsl(${hueBase + (Math.random() * 20 - 10)}, 100%, 60%)`, grazed: false }); }
    } else if (phase === 3) {
        let phase3Count = Math.floor(count2 * 0.5);
        for (let i = 0; i < phase3Count; i++) { let angle = (Math.PI / 2) + (i * Math.PI / phase3Count) - (Math.PI / 2); createEnemyBullet(spawnX, enemy.y, angle, 120 * speedMultiplier, hueBase); }
        if (Math.random() < 0.35) { playSE('enemyBurst', 3); let angle = Math.atan2(player.y - enemy.y, player.x - enemy.x); for (let j = 0; j < 3; j++) { createEnemyBullet(spawnX, enemy.y, angle, (150 + j * 40) * speedMultiplier, hueBase, 5); } }
    } else if (phase === 4) {
        let halfCount = Math.floor(count2 / 2);
        for (let i = 0; i < halfCount; i++) { let angle1 = (i * Math.PI * 2 / halfCount) + time; let angle2 = (i * Math.PI * 2 / halfCount) - time; createEnemyBullet(spawnX, enemy.y, angle1, 96 * speedMultiplier, hueBase); createEnemyBullet(spawnX, enemy.y, angle2, 96 * speedMultiplier, hueBase); }
        if (Math.random() < 0.3) { playSE('enemyBurst', 6); let angle = Math.atan2(player.y - enemy.y, player.x - enemy.x); for (let j = 0; j < 6; j++) { createEnemyBullet(spawnX, enemy.y, angle, (150 + j * 30) * speedMultiplier, hueBase, 5); } }
    } else if (phase === 5) {
        let pattern = Math.floor(Math.random() * 4);
        if (pattern === 0) {
            let halfCount = Math.floor(count2 / 2);
            for (let i = 0; i < halfCount; i++) {
                let angle1 = (i * Math.PI * 2 / halfCount) + (time * 2.5); let angle2 = (i * Math.PI * 2 / halfCount) - (time * 2.5);
                let speed1 = (100 + (i % 2 === 0 ? 35 : -35)) * speedMultiplier; let speed2 = (100 + (i % 2 === 0 ? -35 : 35)) * speedMultiplier;
                createEnemyBullet(spawnX, enemy.y, angle1, speed1, hueBase); createEnemyBullet(spawnX, enemy.y, angle2, speed2, hueBase);
            }
        } else if (pattern === 1) {
            for (let i = 0; i < 7; i++) {
                let angleL = Math.PI / 3 + (i - 3) * 0.08;
                let angleR = Math.PI * 2 / 3 + (i - 3) * 0.08;
                createEnemyBullet(spawnX - 50, enemy.y, angleL, 170 * speedMultiplier, hueBase);
                createEnemyBullet(spawnX + 50, enemy.y, angleR, 170 * speedMultiplier, hueBase);
            }
        } else if (pattern === 2) {
            playSE('enemyBurst', 12); let targetAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            for (let i = 0; i < 12; i++) {
                let speed = (140 + i * 15) * speedMultiplier;
                createEnemyBullet(spawnX, enemy.y, targetAngle, speed, hueBase, 5);
                createEnemyBullet(spawnX, enemy.y, targetAngle - 0.12, speed, hueBase, 5);
                createEnemyBullet(spawnX, enemy.y, targetAngle + 0.12, speed, hueBase, 5);
            }
        } else if (pattern === 3) {
            let count = 30;
            for (let i = 0; i < count; i++) {
                let angle = (i * Math.PI * 2 / count) + Math.random() * 0.3;
                let speed = (120 + Math.random() * 80) * speedMultiplier;
                createEnemyBullet(spawnX, enemy.y, angle, speed, hueBase);
            }
        }
    }
}

function getBeamCoords(beam) {
    let len = 1000;
    return { x1: beam.originX - Math.cos(beam.angle) * len, y1: beam.originY - Math.sin(beam.angle) * len, x2: beam.originX + Math.cos(beam.angle) * len, y2: beam.originY + Math.sin(beam.angle) * len };
}

function getDistToSegment(px, py, x1, y1, x2, y2) {
    let dx = x2 - x1, dy = y2 - y1; let t = ((px - x1) * dx + (py - y1) * dy) / (dx*dx + dy*dy); t = Math.max(0, Math.min(1, t));
    let nearestX = x1 + t * dx, nearestY = y1 + t * dy; return Math.hypot(px - nearestX, py - nearestY);
}

function spawnGokusaiPattern1(wave) {
    let gokusai = gokusaiBosses.find(b => b.id === 0);
    if (!gokusai) return;
    
    let orbitDir = (wave % 2 !== 0) ? 1 : -1;
    let colors = [
        ['#ff3333', '#ff9933'],
        ['#ffff33', '#33cc33'],
        ['#3388ff', '#a333ff'],
        ['#ff3333', '#ff9933', '#ffff33', '#33cc33', '#3388ff', '#a333ff']
    ];
    let waveColors = colors[(wave - 1) % colors.length];
    
    for (let i = 0; i < 24; i++) {
        let baseAngle = (i / 24) * Math.PI * 2;
        let c = waveColors[i % waveColors.length];
        bullets.push({
            isOrbit: true, orbitCenter: { x: gokusai.x, y: gokusai.y },
            orbitAngle: baseAngle, orbitSpeed: 0.6, orbitDir: orbitDir, orbitTime: 0,
            size: 6, color: c, grazed: false
        });
    }
}

function spawnGokusaiPattern2() {
    let gokusai = gokusaiBosses.find(b => b.id === 0);
    if (!gokusai) return;
    let targetAngle = Math.atan2(player.y - gokusai.y, player.x - gokusai.x);
    // === 調整: パターン2 連射数・間隔調整 ===
    let angles = [
        targetAngle - 10 * Math.PI/180, targetAngle - 5 * Math.PI/180, targetAngle, targetAngle + 5 * Math.PI/180, targetAngle + 10 * Math.PI/180
    ];
    let speeds = [600, 600, 600, 600, 600]; 
    let colors = ['#ff3333', '#ff9933', '#ffff33', '#33cc33', '#3388ff'];
    
    playSE('enemyBurst', 5);
    for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 16; j++) {
            bullets.push({
                x: gokusai.x, y: gokusai.y, dx: Math.cos(angles[i]) * speeds[i], dy: Math.sin(angles[i]) * speeds[i],
                size: 5, color: colors[i], delay: j * 0.05, grazed: false
            });
        }
    }
}

function spawnGokusaiPattern3() {
    let gokusai = gokusaiBosses.find(b => b.id === 0);
    if (!gokusai) return;
    let count = 100 + Math.floor(Math.random() * 31);
    playSE('enemyBurst', 8);
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speedMult = 0.25 + Math.random() * 3.75;
        let speed = 120 * speedMult;
        let color = '#ffffff';
        if (speed <= 120) color = Math.random() < 0.5 ? '#3388ff' : '#a333ff';
        else if (speed <= 300) color = Math.random() < 0.5 ? '#33cc33' : '#ffff33';
        else color = Math.random() < 0.5 ? '#ff9933' : '#ff3333';
        
        bullets.push({ x: gokusai.x, y: gokusai.y, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed, size: 3 + Math.random()*1.5, color: color, grazed: false });
    }
}

function spawnGokusaiPattern4() {

    let time = gameTime / 200;

        bullets.push({ x: gokusai.x, y: gokusai.y, dx: Math.cos(angle2) * speed, dy: Math.sin(angle2) * speed, size: 4 + Math.random()*2, color: color2, grazed: false });
    }
}

function spawnGokusaiPattern5() {

        bullets.push({ x: gokusai.x + 50, y: gokusai.y, dx: Math.cos(angleR) * speed, dy: Math.sin(angleR) * speed, size: 4 + Math.random()*2, color: colorR, grazed: false });

function spawnReflectWall() {
    let wall = { life: 3000, type: Math.random() < 0.2 ? 'white' : 'gray' };
    // 横壁（天井・床）を70%に増やし、縦壁（左右）を30%に減らす
    let isVert = Math.random() < 0.3;  // 縦壁30% / 横壁70%
    if (isVert) {
        // 縦壁（左右）はそのままランダム配置（出現頻度は低い）
        wall.w = 15; wall.h = 120;
        wall.x = Math.random() < 0.5 ? 0 : CONFIG.width - wall.w;
        wall.y = Math.random() * (CONFIG.height - wall.h);
        wall.isVertical = true;
    } else {
        // 横壁（天井・床）は下端（床）を70%優先
        wall.w = 120; wall.h = 15;
        wall.x = Math.random() * (CONFIG.width - wall.w);
        if (Math.random() < 0.7) {
            wall.y = CONFIG.height - wall.h; // 床（下端）
        } else {
            wall.y = 0; // 天井（上端）
        }
        wall.isVertical = false;
    }
    reflectWalls.push(wall);
}

function summonFiveBosses() {
    let gokusai = gokusaiBosses.find(b => b.id === 0);
    if (!gokusai) return;
    gokusaiState.madnessSummoned = true;
    
    let radius = 150;
    let colors = ['#3388ff', '#33cc33', '#ffff33', '#ff9933', '#ff3333'];
    let phases = [1, 2, 3, 4, 5];
    
    for (let i = 0; i < 5; i++) {
        let angle = -Math.PI/2 + (i * Math.PI * 2 / 5);
        gokusaiBosses.push({
            id: i + 1, x: gokusai.x + radius * Math.cos(angle), y: gokusai.y + radius * Math.sin(angle), health: 50, maxHealth: 50,
            type: 'summon', phase: phases[i], color: colors[i], lastSpawn: gameTime,
            // === 追加: 召喚ボス回転 ===
            angle: angle, orbitRadius: radius
        });
    }
}

function spawnSummonedBullets(boss) {
    let phase = boss.phase;
    let time = gameTime / 200;
    let speedMultiplier = [0, 1.0, 1.2, 1.4, 1.6, 1.33][phase];
    let count2 = phase === 5 ? 20 : Math.floor(CONFIG.enemy.bulletWaveCount * 0.6);
    let hueBase = [0, 200, 120, 60, 30, 0][phase];
    let spawnX = boss.x;
    let enemyY = boss.y;

    if (phase === 1) {
        let phase1Count = Math.floor(count2 * 0.40);
        for (let i = 0; i < phase1Count; i++) { let angle = (i * Math.PI * 2 / phase1Count) + time; createEnemyBullet(spawnX, enemyY, angle, 96 * speedMultiplier, hueBase); }
    } else if (phase === 2) {
        for (let i = 0; i < count2; i++) { let angle = (i * Math.PI * 2 / count2); let speed = (72 + Math.random() * 60) * speedMultiplier; createEnemyBullet(spawnX, enemyY, angle, speed, hueBase); }
    } else if (phase === 3) {
        let phase3Count = Math.floor(count2 * 0.5);
        for (let i = 0; i < phase3Count; i++) { let angle = (Math.PI / 2) + (i * Math.PI / phase3Count) - (Math.PI / 2); createEnemyBullet(spawnX, enemyY, angle, 120 * speedMultiplier, hueBase); }
    } else if (phase === 4) {
        let halfCount = Math.floor(count2 / 2);
        for (let i = 0; i < halfCount; i++) { let angle1 = (i * Math.PI * 2 / halfCount) + time; let angle2 = (i * Math.PI * 2 / halfCount) - time; createEnemyBullet(spawnX, enemyY, angle1, 96 * speedMultiplier, hueBase); createEnemyBullet(spawnX, enemyY, angle2, 96 * speedMultiplier, hueBase); }
    } else if (phase === 5) {
        let count = 15;
        for (let i = 0; i < count; i++) {
            let angle = (i * Math.PI * 2 / count) + Math.random() * 0.3;
            let speed = (100 + Math.random() * 60) * speedMultiplier;
            createEnemyBullet(spawnX, enemyY, angle, speed, hueBase);
        }
    }
}

function updateSummonedBoss(dt, boss) {
    let currentShotInterval = boss.phase === 5 ? 300 : CONFIG.enemy.shotInterval * 1.5;
    if (gameTime - boss.lastSpawn > currentShotInterval) {
        spawnSummonedBullets(boss);
        boss.lastSpawn = gameTime;
    }
}

function updateGokusai(dt) {
    gameTime += dt * 1000; 

    player.isSlow = keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyX'] || touchSlowMode;
    let speedSetting = player.isSlow ? player.slowSpeed : player.speed;
    let s = speedSetting * dt; 
    
    if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= s;
    if ((keys['ArrowDown'] || keys['KeyS']) && player.y < CONFIG.height) player.y += s;
    if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= s;
    if ((keys['ArrowRight'] || keys['KeyD']) && player.x < CONFIG.width) player.x += s;

    if (joystick.active) {
        let dx = joystick.currentX - joystick.startX, dy = joystick.currentY - joystick.startY, dist = Math.hypot(dx, dy);
        if (dist > 0) { let strength = dist / joystick.maxDistance; player.x += (dx / dist) * strength * s; player.y += (dy / dist) * strength * s; }
    }

    player.x = Math.max(0, Math.min(CONFIG.width, player.x));
    player.y = Math.max(130, Math.min(CONFIG.height, player.y)); 
    
    if (CONFIG.debug) { player.invincible = true; } 
    else if (player.invincible) {
        let invDur = noHitAllClear ? 2000 : 1200;
        if (gameTime - player.invTime > invDur) player.invincible = false;
    }

    if (player.health < CONFIG.player.autoHealLimit) {
        if (gameTime - player.lastHitTime >= CONFIG.player.healInterval) { player.health += CONFIG.player.autoHealAmount; player.lastHitTime = gameTime; }
    } else { player.lastHitTime = gameTime; }

    if (player.energy < 100) { player.energy += (100 / CONFIG.player.energyChargeTime) * dt; if (player.energy > 100) player.energy = 100; }

    if ((keys['KeyZ'] || keys['Enter']) && player.energy >= 100 && !playerBeam.active) { playerBeam.active = true; playerBeam.startTime = gameTime; player.energy = 0; playSE('playerBeam'); }
    if (playerBeam.active && gameTime - playerBeam.startTime > CONFIG.player.beamActiveDuration) { playerBeam.active = false; }

    if (flashOpacity > 0) { flashOpacity -= 2.5 * dt; if (flashOpacity < 0) flashOpacity = 0; }

    let gokusai = gokusaiBosses.find(b => b.id === 0);
    
    if (gokusai && !gokusaiState.madness) {
        gokusai.x = getSpawnX();
    }

    if (playerBeam.active) {
        if (gokusai && Math.abs(player.x - gokusai.x) < 30) {
            gokusai.health -= 10 * dt; 
        }
    }
    
    if (gameTime - lastShotTime > CONFIG.player.shotInterval) {
        playerBullets.push({ x: player.x, y: player.y, vx: 0, vy: -CONFIG.player.bulletSpeed }); lastShotTime = gameTime; playSE('playerShot');
    }
    
    playerBullets.forEach((pb, index) => {
        if (gokusai) {
            let dx = gokusai.x - pb.x; let dy = gokusai.y - pb.y;
            if (Math.abs(dx) < CONFIG.player.homingRangeX && Math.abs(dy) < CONFIG.player.homingRangeY) {
                let dist = Math.hypot(dx, dy);
                if (dist > 0) {
                    pb.vx += (dx / dist) * CONFIG.player.homingStrength * dt; pb.vy += (dy / dist) * CONFIG.player.homingStrength * dt;
                    let speed = Math.hypot(pb.vx, pb.vy);
                    if (speed > 0) { pb.vx = (pb.vx / speed) * CONFIG.player.bulletSpeed; pb.vy = (pb.vy / speed) * CONFIG.player.bulletSpeed; } else { pb.vx = 0; pb.vy = -CONFIG.player.bulletSpeed; }
                }
            }
        }
        pb.x += pb.vx * dt; pb.y += pb.vy * dt;

        for (let i = 0; i < bullets.length; i++) {
            let b = bullets[i];
            if (b.isHoming && b.hp > 0) {
                let hDist = Math.hypot(pb.x - b.x, pb.y - b.y);
                if (hDist < (b.size / 2) + 2) {
                    b.hp -= 1; pb.hit = true;
                    if (gameTime - lastHitSeTime > 50) { playSE('hit'); lastHitSeTime = gameTime; }
                    if (b.hp <= 0) b.out = true;
                    break;
                }
            }
        }
        if (pb.hit) return;

        for (let i = 0; i < gokusaiBosses.length; i++) {
            let boss = gokusaiBosses[i];
            if (boss.health <= 0) continue;
            let bossSize = boss.type === 'gokusai' ? 25 : 15;
            if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < bossSize + 10) {
                boss.health -= CONFIG.player.bulletDamage;
                player.energy = Math.min(100, player.energy + CONFIG.player.energyHitRecover);
                pb.hit = true;
                if (gameTime - lastHitSeTime > 50) { playSE('hit'); lastHitSeTime = gameTime; }
                break;
            }
        }
        if (pb.y < 0) pb.hit = true;
    });
    playerBullets = playerBullets.filter(pb => !pb.hit);

    let isBeamInvincible = (playerBeam.startTime > 0 && gameTime - playerBeam.startTime < 2000);

    reflectWalls.forEach(w => w.life -= dt * 1000);
    reflectWalls = reflectWalls.filter(w => w.life > 0);

    bullets.forEach((b, index) => {
        if (b.delay && b.delay > 0) {
            b.delay -= dt;
            return;
        }

        if (b.isOrbit) {
            b.orbitTime += dt;
            let r = 30 + b.orbitTime * 80;
            let angle = b.orbitAngle + b.orbitTime * b.orbitSpeed * b.orbitDir;
            b.x = b.orbitCenter.x + r * Math.cos(angle);
            b.y = b.orbitCenter.y + r * Math.sin(angle);
        } else {
            b.x += b.dx * dt; b.y += b.dy * dt;
            if (!b.reflected) {
                for (let w of reflectWalls) {
                    if (b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) {
                        b.reflected = true;
                        if (w.type === 'white') {
                            let speed = Math.hypot(b.dx, b.dy) * 0.25;  // 1.5 → 0.25
                            let targetAngle = Math.atan2(player.y - b.y, player.x - b.x);
                            b.dx = Math.cos(targetAngle) * speed;
                            b.dy = Math.sin(targetAngle) * speed;
                        } else if (w.type === 'gray') {
                            let a = Math.random() * Math.PI * 2;
                            let speed = Math.hypot(b.dx, b.dy) * 0.25;
                            b.dx = Math.cos(a) * speed; b.dy = Math.sin(a) * speed;
                        }
                        break;
                    }
                }
            }
        }

        let dist = Math.hypot(b.x - player.x, b.y - player.y);
        if (dist < (b.size / 2) + CONFIG.player.hitboxRadius) {
            if (!CONFIG.debug) {
                if (!player.invincible && !isBeamInvincible) gokusaiTakeDamage(); 
                else if (isBeamInvincible) { isPhaseNoHit = false; continuousNoHitPhases = 0; }
            }
        } 
        else if (dist < (b.size / 2) + CONFIG.player.grazeRange && !b.grazed) {
            b.grazed = true; player.graze++; player.energy = Math.min(100, player.energy + CONFIG.player.grazeEnergyRecover);
            let healAdvance = noHitAllClear ? 500 : 100;
            if (player.health < CONFIG.player.autoHealLimit) player.lastHitTime -= healAdvance;
            floatTexts.push({ x: 35 + (Math.random() * 20 - 10), y: 85, text: `-${healAdvance/1000}sec!`, color: "cyan", alpha: 1.0, life: 0.6 });
            playSE('graze'); spawnGrazeEffect(b.x, b.y);
        }
        
        if (b.y < -50 || b.y > CONFIG.height + 50 || b.x < -50 || b.x > CONFIG.width + 50) b.out = true;
    });
    bullets = bullets.filter(b => !b.out);
    
    if (bullets.length > 1200) bullets.splice(0, bullets.length - 1200); 

    grazeParticles.forEach((p) => { p.x += p.dx * dt; p.y += p.dy * dt; p.life -= dt; });
    grazeParticles = grazeParticles.filter(p => p.life > 0);
    floatTexts.forEach((t) => { t.y += 20 * dt; t.life -= dt; });
    floatTexts = floatTexts.filter(t => t.life > 0);

    gokusaiBeams.forEach(bm => {
        if (bm.state === 'warning' && gameTime - bm.startTime > 300) {
            bm.state = 'active'; bm.startTime = gameTime; playSE('enemyBeam');
        } else if (bm.state === 'active' && gameTime - bm.startTime > 1000) {
            bm.state = 'done';
        }
        if (bm.state === 'active') {
            if (!CONFIG.debug && !player.invincible && !isBeamInvincible) {
                if (bm.isVertical && Math.abs(player.x - bm.val) < 10) gokusaiTakeDamage();
                if (!bm.isVertical && Math.abs(player.y - bm.val) < 10) gokusaiTakeDamage();
            }
        }
    });
    gokusaiBeams = gokusaiBeams.filter(b => b.state !== 'done');

    if (!gokusaiState.madness) {
        
        if (gameTime - gokusaiState.lastBeamTime >= 1500) {
            if (gokusaiState.nextBeamIsVertical) spawnGokusaiBeamV();
            else spawnGokusaiBeamH();
            gokusaiState.nextBeamIsVertical = !gokusaiState.nextBeamIsVertical;
            gokusaiState.lastBeamTime = gameTime;
        }

        gokusaiState.cycleTimer += dt * 1000;
        if (gokusaiState.cycleTimer >= 2000) { 
            gokusaiState.cycleTimer -= 2000;
            gokusaiState.currentPatternIdx++;
            if (gokusaiState.currentPatternIdx > 5) gokusaiState.currentPatternIdx = 1; 
            gokusaiState.activePatterns[gokusaiState.currentPatternIdx].time = 3000;
            gokusaiState.activePatterns[gokusaiState.currentPatternIdx].nextShot = 0; 
        }

        for (let i = 1; i <= 5; i++) { 
            let pat = gokusaiState.activePatterns[i];
            if (pat.time > 0) {
                pat.time -= dt * 1000;
                pat.nextShot -= dt * 1000;
                if (pat.nextShot <= 0) {
                    if (i === 1) {
                        spawnGokusaiPattern1(pat.wave);
                        pat.wave++;
                        pat.nextShot = 600; 
                    } else if (i === 2) {
                        spawnGokusaiPattern2();
                        pat.nextShot = 300; 
                    } else if (i === 3) {
                        spawnGokusaiPattern3();
                        pat.nextShot = 600; 
                    } else if (i === 4) {
                        spawnGokusaiPattern4();
                        pat.nextShot = 800; 
                    } else if (i === 5) {
                        spawnGokusaiPattern5();
                        pat.nextShot = 400; 
                    }
                }
            } else {
                if (i === 1) pat.wave = 1; 
            }
        }

        gokusaiState.wallTimer -= dt * 1000;
        if (gokusaiState.wallPhase === 'active') {
            if (gokusaiState.wallTimer <= 0) {
                gokusaiState.wallPhase = 'cooldown';
                gokusaiState.wallTimer = 1000; 
                reflectWalls = []; 
            } else {
                if (gameTime - gokusaiState.lastWallSpawnTime >= 1000) {
                    let spawnCount = 3 - reflectWalls.length;
                    for(let j=0; j<spawnCount; j++) spawnReflectWall();
                    gokusaiState.lastWallSpawnTime = gameTime;
                }
            }
        } else {
            if (gokusaiState.wallTimer <= 0) {
                gokusaiState.wallPhase = 'active';
                gokusaiState.wallTimer = 3000; 
                gokusaiState.lastWallSpawnTime = gameTime;
                for(let j=0; j<3; j++) spawnReflectWall();
            }
        }

        if (gokusai && gokusai.health <= 100 && !gokusaiState.madnessSummoned) {
            gokusaiState.madness = true; flashOpacity = 1.0; summonFiveBosses();
            reflectWalls = []; 
            gokusaiBeams = []; 
        }
    } else {
        // === 追加: 召喚ボス回転 ===
        let rotationSpeed = 0.5; // 回転速度 (rad/秒)
        gokusaiBosses.forEach(boss => { 
            if (boss.type === 'summon' && gokusai) { 
                boss.angle += rotationSpeed * dt;
                boss.x = gokusai.x + boss.orbitRadius * Math.cos(boss.angle);
                boss.y = gokusai.y + boss.orbitRadius * Math.sin(boss.angle);
                updateSummonedBoss(dt, boss); 
            } 
        });
    }

    gokusaiBosses = gokusaiBosses.filter(b => b.health > 0 || b.id === 0);
    
    if (gokusaiState.madness) {
        let summons = gokusaiBosses.filter(b => b.type === 'summon');
        if (summons.length === 0) {
            gokusaiState.madness = false;
        }
    }
    
    if (!gokusai || gokusai.health <= 0) {
        handleGokusaiClear();
    }
}

function drawGokusai(ctx) {
    ctx.save(); ctx.strokeStyle = "rgba(255, 255, 255, 0.2)"; ctx.lineWidth = 1; ctx.setLineDash([5, 15]); ctx.beginPath(); ctx.moveTo(CONFIG.width/2, 0); ctx.lineTo(CONFIG.width/2, CONFIG.height); ctx.stroke(); ctx.restore();

    let gokusai = gokusaiBosses.find(b => b.id === 0);
    if (gokusai && (Math.floor(gameTime / 100) % 2 !== 0 || !player.invincible)) {
        ctx.save();
        ctx.fillStyle = "black"; ctx.strokeStyle = "white"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(gokusai.x, gokusai.y, 25, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(gokusai.x, gokusai.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    gokusaiBosses.forEach(b => {
        if (b.type === 'summon') {
            ctx.save();
            ctx.fillStyle = b.color; ctx.globalAlpha = 0.5;
            ctx.beginPath(); ctx.arc(b.x, b.y, 20, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    });

    if (playerBeam.active) { ctx.fillStyle = "rgba(100, 200, 255, 0.8)"; ctx.fillRect(player.x - CONFIG.player.beamWidth / 2, 0, CONFIG.player.beamWidth, player.y); ctx.fillStyle = "white"; ctx.fillRect(player.x - CONFIG.player.beamCoreWidth / 2, 0, CONFIG.player.beamCoreWidth, player.y); }

    ctx.fillStyle = "rgba(100, 150, 200, 0.8)"; playerBullets.forEach(pb => ctx.fillRect(pb.x - 2, pb.y - 5, 4, 10));
    ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; grazeParticles.forEach(p => { ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3); });

    gokusaiBeams.forEach(bm => {
        if (bm.state === 'warning') {
            ctx.fillStyle = "rgba(255, 255, 0, 0.4)";
            if (bm.isVertical) ctx.fillRect(bm.val - 10, 0, 20, CONFIG.height); else ctx.fillRect(0, bm.val - 10, CONFIG.width, 20);
        } else if (bm.state === 'active') {
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            if (bm.isVertical) ctx.fillRect(bm.val - 10, 0, 20, CONFIG.height); else ctx.fillRect(0, bm.val - 10, CONFIG.width, 20);
        }
    });

    reflectWalls.forEach(w => {
        ctx.fillStyle = w.type === 'white' ? "rgba(255,255,255,0.4)" : "rgba(100,100,100,0.6)";
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.strokeStyle = w.type === 'white' ? "#fff" : "#999";
        ctx.strokeRect(w.x, w.y, w.w, w.h);
    });

    bullets.forEach(b => { 
        if (b.delay > 0) ctx.globalAlpha = 0.3;
        ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill(); 
        ctx.globalAlpha = 1.0;
    });
    
    let isBeamInvincible = (playerBeam.startTime > 0 && gameTime - playerBeam.startTime < 2000);
    let playerColor = "white"; let shouldDrawPlayer = true;
    if (player.isTestMode) { playerColor = player.isSlow ? "red" : "white"; } 
    else if (isBeamInvincible) { playerColor = "yellow"; } 
    else if (player.invincible) { if (Math.floor(gameTime / 100) % 2 === 0) playerColor = "white"; else shouldDrawPlayer = false; } 
    else if (player.isSlow) { playerColor = "red"; }

    if (shouldDrawPlayer) { ctx.fillStyle = playerColor; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2); ctx.fill(); }
    if (player.isSlow) { ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.strokeRect(player.x - 1.5, player.y - 1.5, 3, 3); }

    if (CONFIG.debug) {
        ctx.fillStyle = "rgba(0, 255, 0, 0.4)"; ctx.beginPath(); ctx.arc(player.x, player.y, CONFIG.player.hitboxRadius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(0, 255, 0, 0.5)"; ctx.lineWidth = 1; ctx.strokeRect(CONFIG.ui.pauseBtnX, CONFIG.ui.pauseBtnY, CONFIG.ui.pauseBtnSize, CONFIG.ui.pauseBtnSize);
    }

    ctx.save();
    floatTexts.forEach((t) => { ctx.globalAlpha = Math.max(0, t.life / 0.6); ctx.fillStyle = t.color; ctx.font = "bold 15px 'Pixelify Sans', sans-serif"; ctx.textAlign = "left"; ctx.fillText(t.text, t.x, t.y); });
    ctx.restore();

    if (joystick.active) { ctx.strokeStyle = "rgba(255, 255, 255, 0.2)"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, joystick.maxDistance, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; ctx.beginPath(); ctx.arc(joystick.currentX, joystick.currentY, 15, 0, Math.PI * 2); ctx.fill(); }

    ctx.fillStyle = "#333"; ctx.fillRect(10, 5, CONFIG.width - 20, 10); ctx.fillStyle = player.energy >= 100 ? "yellow" : "cyan"; ctx.fillRect(10, 5, (player.energy / 100) * (CONFIG.width - 20), 10);
    let healTimerText = "";
    if (player.health < CONFIG.player.autoHealLimit) { let timeLeft = Math.ceil((CONFIG.player.healInterval - (gameTime - player.lastHitTime)) / 1000); if (timeLeft > 0) healTimerText = " (回復 " + timeLeft + "s)"; }
    ctx.fillStyle = "white"; ctx.font = "20px 'Pixelify Sans', sans-serif"; ctx.fillText("HP: " + player.health + "  Graze: " + player.graze + healTimerText, 10, 40);
    
    ctx.font = "20px 'Pixelify Sans', sans-serif"; 
    let hpText = (isMuted ? "🔇 " : "🔊 ") + "Gokusai HP: " + (gokusai ? Math.floor(Math.max(0, gokusai.health)) : 0);
    ctx.fillText(hpText, CONFIG.width - 200, 40); 
    
    if (player.isTestMode) { ctx.fillStyle = "#33cc33"; ctx.font = "bold 18px 'Pixelify Sans', sans-serif"; ctx.fillText("⚡ TEST MODE", 10, 110); }

    ctx.fillStyle = "rgba(255, 255, 255, 0.15)"; ctx.fillRect(CONFIG.ui.pauseBtnX, CONFIG.ui.pauseBtnY, CONFIG.ui.pauseBtnSize, CONFIG.ui.pauseBtnSize); ctx.strokeStyle = "rgba(255, 255, 255, 0.6)"; ctx.lineWidth = 1.5; ctx.strokeRect(CONFIG.ui.pauseBtnX, CONFIG.ui.pauseBtnY, CONFIG.ui.pauseBtnSize, CONFIG.ui.pauseBtnSize); ctx.fillStyle = "white"; ctx.font = "bold 18px 'Pixelify Sans', sans-serif"; ctx.textAlign = "center"; ctx.fillText(":", CONFIG.ui.pauseBtnX + CONFIG.ui.pauseBtnSize / 2, CONFIG.ui.pauseBtnY + 24); ctx.textAlign = "left";

    if (flashOpacity > 0) { ctx.save(); ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity})`; ctx.fillRect(0, 0, CONFIG.width, CONFIG.height); ctx.restore(); }
}

function takeDamage() {
    player.health -= 1; if (player.health < 0) player.health = 0;
    player.lastHitTime = gameTime; isPhaseNoHit = false; continuousNoHitPhases = 0; 
    if (player.health <= 0) { 
        playSE('gameover');
        setGameState('gameover'); 
    } 
    else { playSE('playerHit'); player.invincible = true; player.invTime = gameTime; }
}

function update(dt) {
    gameTime += dt * 1000; 

    player.isSlow = keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyX'] || touchSlowMode;
    let speedSetting = player.isSlow ? player.slowSpeed : player.speed;
    let s = speedSetting * dt; 
    
    if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= s;
    if ((keys['ArrowDown'] || keys['KeyS']) && player.y < CONFIG.height) player.y += s;
    if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= s;
    if ((keys['ArrowRight'] || keys['KeyD']) && player.x < CONFIG.width) player.x += s;

    if (joystick.active) {
        let dx = joystick.currentX - joystick.startX, dy = joystick.currentY - joystick.startY, dist = Math.hypot(dx, dy);
        if (dist > 0) { let strength = dist / joystick.maxDistance; player.x += (dx / dist) * strength * s; player.y += (dy / dist) * strength * s; }
    }

    player.x = Math.max(0, Math.min(CONFIG.width, player.x));
    player.y = Math.max(enemy.y + 30, Math.min(CONFIG.height, player.y)); 
    
    let currentBossHitboxPhase = getBossPhase();
    if (CONFIG.debug || (player.isTestMode && currentBossHitboxPhase !== 5)) { player.invincible = true; } 
    else if (player.invincible) {
        let invDur = CONFIG.player.invincibleDuration;
        if (getBossPhase() === 5) invDur = CONFIG.player.invincibleDuration * 0.8; 
        if (gameTime - player.invTime > invDur) {
            player.invincible = false;
        }
    }

    if (player.health < CONFIG.player.autoHealLimit) {
        if (gameTime - player.lastHitTime >= CONFIG.player.healInterval) { player.health += CONFIG.player.autoHealAmount; player.lastHitTime = gameTime; }
    } else { player.lastHitTime = gameTime; }

    if (player.energy < 100) { player.energy += (100 / CONFIG.player.energyChargeTime) * dt; if (player.energy > 100) player.energy = 100; }

    if ((keys['KeyZ'] || keys['Enter']) && player.energy >= 100 && !playerBeam.active) { playerBeam.active = true; playerBeam.startTime = gameTime; player.energy = 0; playSE('playerBeam'); }
    if (playerBeam.active && gameTime - playerBeam.startTime > CONFIG.player.beamActiveDuration) { playerBeam.active = false; }

    enemy.x = getSpawnX();

    let newPhase = getBossPhase();
    if (newPhase !== currentBossPhase) {
        if (practicePhase === null) {
            if (newPhase === 5) playSE('phase5Change'); else if (newPhase > currentBossPhase) playSE('phaseChange'); 
            bullets = []; beam.state = 'idle'; beam.lastTrigger = gameTime; playerBeam.active = false; player.energy = 0;
            player.x = CONFIG.width / 2; player.y = 680; enemy.x = CONFIG.enemy.x; enemy.y = CONFIG.enemy.y;
            
            let hpBonus = player.health * 3000; addScore(hpBonus);
            if (!player.isTestMode && !CONFIG.debug) floatTexts.push({ x: CONFIG.width / 2 - 80, y: CONFIG.height / 2, text: "PHASE BONUS +" + hpBonus, color: "gold", alpha: 1.0, life: 1.5 });
            
            if (isPhaseNoHit) {
                continuousNoHitPhases++; let noHitBonus = 0; let bonusText = "";
                if (continuousNoHitPhases === 1) { noHitBonus = 20000; bonusText = "NO HIT BONUS +20000!"; } 
                else if (continuousNoHitPhases === 2) { noHitBonus = 30000; bonusText = "2-CONSECUTIVE NO HIT +30000!"; } 
                else if (continuousNoHitPhases === 3) { noHitBonus = 40000; bonusText = "3-CONSECUTIVE NO HIT +40000!"; } 
                else if (continuousNoHitPhases === 4) { noHitBonus = 60000; bonusText = "4-CONSECUTIVE NO HIT +60000!"; }
                addScore(noHitBonus);
                if (!player.isTestMode && !CONFIG.debug) floatTexts.push({ x: CONFIG.width / 2 - 120, y: CONFIG.height / 2 - 30, text: bonusText, color: "#ffcc00", alpha: 1.0, life: 1.8 });
            }
            if (newPhase === 5) {
                player.health = CONFIG.player.health;
                enemy.lastHomingSpawn = gameTime;
            }
            if (gameState === 'playing') {
                playBGMForPhase(newPhase); 
            }
            isPhaseNoHit = true; currentBossPhase = newPhase; flashOpacity = 1.0; 
        }
    }

    if (flashOpacity > 0) { flashOpacity -= 2.5 * dt; if (flashOpacity < 0) flashOpacity = 0; }

    if (newPhase === 5 && enemy.health < 100 && enemy.health > 0) {
        if (gameTime - enemy.lastRegenTime >= CONFIG.enemy.regenInterval) { enemy.health = Math.min(100, enemy.health + CONFIG.enemy.regenAmount); enemy.lastRegenTime = gameTime; }
    }

    let currentBulletDamage = CONFIG.player.bulletDamage; let currentBeamDamage = CONFIG.player.beamDamage; 
    if (newPhase === 4) { currentBulletDamage = 2; currentBeamDamage = 30; } else if (newPhase === 5) { currentBulletDamage = 1; currentBeamDamage = 10; }

    if (playerBeam.active) {
        if (Math.abs(player.x - enemy.x) < 30) {
            enemy.health -= currentBeamDamage * dt; addScore(Math.floor(300 * dt));
            if (enemy.health <= 0) handleGameClear();
        }
    }

    let currentBeamCooldown = (getBossPhase() === 5) ? 1500 : CONFIG.enemy.beamCooldown;
    if (beam.state === 'idle' && gameTime - beam.lastTrigger > currentBeamCooldown) {
        beam.state = 'warning'; beam.startTime = gameTime; beam.originX = (Math.floor(Math.random() * 10) * (CONFIG.width / 10)) + (CONFIG.width / 20); beam.angle = Math.PI / 2; playSE('warning');
    } else if (beam.state === 'warning' && gameTime - beam.startTime > CONFIG.enemy.beamWarningDuration) {
        beam.state = 'active'; beam.startTime = gameTime; playSE('enemyBeam');
    } else if (beam.state === 'active' && gameTime - beam.startTime > CONFIG.enemy.beamActiveDuration) {
        beam.state = 'idle'; beam.lastTrigger = gameTime;
    }

    let currentShotInterval = (getBossPhase() === 5) ? 150 : CONFIG.enemy.shotInterval;
    if (gameTime - enemy.lastSpawn > currentShotInterval) { spawnBullets(enemy.x); enemy.lastSpawn = gameTime; }

    if (newPhase === 5) {
        if (gameTime - enemy.lastHomingSpawn > 20000) {
            bullets.push({ x: enemy.x, y: enemy.y, dx: 0, dy: CONFIG.player.speed * 0.5, size: 14, color: "#e03399", isHoming: true, homingTime: 0, grazed: false, hp: 20 });
            enemy.lastHomingSpawn = gameTime; playSE('homingSpawn');
        }
    }
    
    if (gameTime - lastShotTime > CONFIG.player.shotInterval) {
        playerBullets.push({ x: player.x, y: player.y, vx: 0, vy: -CONFIG.player.bulletSpeed }); lastShotTime = gameTime; playSE('playerShot');
    }
    
    playerBullets.forEach((pb, index) => {
        let dx = enemy.x - pb.x; let dy = enemy.y - pb.y;
        if (Math.abs(dx) < CONFIG.player.homingRangeX && Math.abs(dy) < CONFIG.player.homingRangeY) {
            let dist = Math.hypot(dx, dy);
            if (dist > 0) {
                pb.vx += (dx / dist) * CONFIG.player.homingStrength * dt; pb.vy += (dy / dist) * CONFIG.player.homingStrength * dt;
                let speed = Math.hypot(pb.vx, pb.vy);
                if (speed > 0) { pb.vx = (pb.vx / speed) * CONFIG.player.bulletSpeed; pb.vy = (pb.vy / speed) * CONFIG.player.bulletSpeed; } else { pb.vx = 0; pb.vy = -CONFIG.player.bulletSpeed; }
            }
        }
        pb.x += pb.vx * dt; pb.y += pb.vy * dt;

        for (let i = 0; i < bullets.length; i++) {
            let b = bullets[i];
            if (b.isHoming && b.hp > 0) {
                let hDist = Math.hypot(pb.x - b.x, pb.y - b.y);
                if (hDist < (b.size / 2) + 2) {
                    b.hp -= currentBulletDamage; pb.hit = true;
                    if (gameTime - lastHitSeTime > 50) { playSE('hit'); lastHitSeTime = gameTime; }
                    if (b.hp <= 0) b.out = true;
                    break;
                }
            }
        }
        if (pb.hit) return;

        let currentBossSize = 10 + (newPhase - 1) * 2.5; 
        if (Math.hypot(pb.x - enemy.x, pb.y - enemy.y) < currentBossSize + 10) {
            enemy.health -= currentBulletDamage; addScore(2000); player.energy = Math.min(100, player.energy + CONFIG.player.energyHitRecover); pb.hit = true;
            if (gameTime - lastHitSeTime > 50) { playSE('hit'); lastHitSeTime = gameTime; }
            if (enemy.health <= 0) handleGameClear();
        }
        if (pb.y < 0) pb.hit = true;
    });
    playerBullets = playerBullets.filter(pb => !pb.hit);

    let currentBeamInvincibleDuration = (newPhase === 5) ? 2000 : CONFIG.player.beamInvincibleDuration;
    let isBeamInvincible = (playerBeam.startTime > 0 && gameTime - playerBeam.startTime < currentBeamInvincibleDuration);

    bullets.forEach((b, index) => {
        if (b.isHoming) {
            b.homingTime += dt;
            if (b.homingTime < 15) {
                let hDx = player.x - b.x; let hDy = player.y - b.y; let hDist = Math.hypot(hDx, hDy);
                if (hDist > 0) {
                    let speedFactor = 1.0;
                    if (hDist < 200) speedFactor = 0.35 + (hDist / 200) * 0.65;
                    let targetSpeed = (CONFIG.player.speed * 0.5) * speedFactor;
                    b.dx = (hDx / hDist) * targetSpeed; b.dy = (hDy / hDist) * targetSpeed;
                }
            } else { b.isHoming = false; }
        }

        b.x += b.dx * dt; b.y += b.dy * dt; let dist = Math.hypot(b.x - player.x, b.y - player.y);

        if (dist < (b.size / 2) + CONFIG.player.hitboxRadius) {
            if (!CONFIG.debug) {
                if (!player.invincible && !isBeamInvincible) takeDamage(); 
                else if (isBeamInvincible) { isPhaseNoHit = false; continuousNoHitPhases = 0; }
            }
        } 
        else if (dist < (b.size / 2) + CONFIG.player.grazeRange && !b.grazed) {
            b.grazed = true; player.graze++; player.energy = Math.min(100, player.energy + CONFIG.player.grazeEnergyRecover); addScore(800);
            let healAdvance = (newPhase === 5) ? 100 : 60;
            if (player.health < CONFIG.player.autoHealLimit) player.lastHitTime -= healAdvance;
            let popupText = (newPhase === 5) ? "-0.1sec!" : "-0.06sec!";
            floatTexts.push({ x: 35 + (Math.random() * 20 - 10), y: 85, text: popupText, color: (newPhase === 5) ? "#ff3333" : "cyan", alpha: 1.0, life: 0.6 });
            playSE('graze'); spawnGrazeEffect(b.x, b.y);
        }
        
        let deleteY = (getBossPhase() === 5) ? enemy.y : -50;
        if (b.y < deleteY || b.y > CONFIG.height + 50 || b.x < -50 || b.x > CONFIG.width + 50) b.out = true;
    });
    bullets = bullets.filter(b => !b.out);
    
    let maxBullets = (getBossPhase() === 5) ? 800 : 500;
    if (bullets.length > maxBullets) bullets.splice(0, bullets.length - maxBullets);

    grazeParticles.forEach((p) => { p.x += p.dx * dt; p.y += p.dy * dt; p.life -= dt; });
    grazeParticles = grazeParticles.filter(p => p.life > 0);
    floatTexts.forEach((t) => { t.y += 20 * dt; t.life -= dt; });
    floatTexts = floatTexts.filter(t => t.life > 0);

    if (beam.state === 'active') {
        let c = getBeamCoords(beam);
        let currentBeamCollisionWidth = (getBossPhase() === 5) ? 20 : CONFIG.enemy.beamCollisionWidth;
        if (getDistToSegment(player.x, player.y, c.x1, c.y1, c.x2, c.y2) < currentBeamCollisionWidth) {
            if (!CONFIG.debug) {
                if (!player.invincible && !isBeamInvincible) takeDamage(); 
                else if (isBeamInvincible) { isPhaseNoHit = false; continuousNoHitPhases = 0; }
            }
        }
    }
}

let bgState = {
    time: 0,
    phase1: { stars: [], nebulas: [], twinkles: [] },
    phase2: { auroras: [], mists: [], particles: [], starTrails: [] },
    phase3: { clouds: [], stars: [], dusts: [], rings: [] },
    phase4: { ashes: [], flares: [], sparks: [] },
    phase5: { embers: [], smokes: [], lightnings: [], explosions: [] }
};
let bgInitialized = false;

function initBackgrounds(width, height) {
    for(let i=0; i<150; i++) bgState.phase1.stars.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*2+0.5, v: Math.random()*20+15});
    for(let i=0; i<10; i++) bgState.phase1.nebulas.push({x: Math.random()*width, y: Math.random()*height, r: Math.random()*100+60, basePhase: Math.random()*Math.PI*2});
    for(let i=0; i<50; i++) bgState.phase1.twinkles.push({x: Math.random()*width, y: Math.random()*height, phase: Math.random()*Math.PI*2, speed: Math.random()*3+1}); 

    for(let i=0; i<20; i++) bgState.phase2.mists.push({x: Math.random()*width, y: Math.random()*height, r: Math.random()*90+60, a: Math.random()*Math.PI*2, speed: Math.random()*0.4+0.1});
    for(let i=0; i<120; i++) bgState.phase2.particles.push({x: Math.random()*width, y: Math.random()*height, phase: Math.random()*Math.PI*2, hue: Math.random()>0.5?120:160});
    for(let i=0; i<10; i++) bgState.phase2.starTrails.push({x: Math.random()*width, y: Math.random()*height, length: Math.random()*100+50, speed: Math.random()*50+30});

    for(let i=0; i<20; i++) bgState.phase3.clouds.push({x: Math.random()*width, y: Math.random()*height, w: Math.random()*120+60, h: Math.random()*40+20, vx: Math.random()*40+20});
    for(let i=0; i<100; i++) bgState.phase3.stars.push({x: Math.random()*width, y: Math.random()*height, phase: Math.random()*Math.PI*2, speed: Math.random()*5+2});
    for(let i=0; i<150; i++) bgState.phase3.dusts.push({x: Math.random()*width, y: Math.random()*height, vx: Math.random()*40-20, vy: Math.random()*40-20});
    for(let i=0; i<3; i++) bgState.phase3.rings.push({x: Math.random()*width, y: Math.random()*height, r: Math.random()*150+50, angle: 0, speed: (Math.random()*0.5+0.1)*(Math.random()>0.5?1:-1)}); 

    for(let i=0; i<200; i++) bgState.phase4.ashes.push({x: Math.random()*width, y: Math.random()*height, vx: Math.random()*60+30, vy: Math.random()*80+50, s: Math.random()*3+1});
    for(let i=0; i<12; i++) bgState.phase4.flares.push({x: Math.random()*width, y: Math.random()*height, baseR: Math.random()*80+40, phase: Math.random()*Math.PI*2});
    for(let i=0; i<50; i++) bgState.phase4.sparks.push({x: Math.random()*width, y: Math.random()*height, vx: Math.random()*100-50, vy: -(Math.random()*100+50), life: Math.random()}); 

    for(let i=0; i<200; i++) bgState.phase5.embers.push({x: Math.random()*width, y: Math.random()*height, vx: Math.random()*40-20, vy: -(Math.random()*120+50), s: Math.random()*3+1});
    for(let i=0; i<25; i++) bgState.phase5.smokes.push({x: Math.random()*width, y: Math.random()*height, r: Math.random()*60+40, vy: -(Math.random()*40+20)});
}

function drawPhase1(dt, ctx) {
    let s = bgState.phase1;
    let grad = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
    grad.addColorStop(0, "#0a0a2a");
    grad.addColorStop(1, "#1a1a4a");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

    s.nebulas.forEach((n, i) => {
        let ox = Math.cos(bgState.time + n.basePhase) * 50;
        let oy = Math.sin(bgState.time * 0.8 + n.basePhase) * 50;
        let nGrad = ctx.createRadialGradient(n.x + ox, n.y + oy, 0, n.x + ox, n.y + oy, n.r);
        nGrad.addColorStop(0, "rgba(100, 150, 255, 0.3)");
        nGrad.addColorStop(1, "rgba(100, 150, 255, 0)");
        ctx.fillStyle = nGrad;
        ctx.beginPath(); ctx.arc(n.x + ox, n.y + oy, n.r, 0, Math.PI*2); ctx.fill();
    });

    ctx.fillStyle = "rgba(200, 220, 255, 0.9)";
    s.stars.forEach(star => {
        star.y += star.v * dt;
        if (star.y > CONFIG.height) { star.y = 0; star.x = Math.random() * CONFIG.width; }
        ctx.fillRect(star.x, star.y, star.s, star.s + star.v*0.1); 
    });

    s.twinkles.forEach(t => {
        let alpha = (Math.sin(bgState.time * t.speed + t.phase) + 1) / 2;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath(); ctx.arc(t.x, t.y, 2, 0, Math.PI*2); ctx.fill();
    });
}

function drawPhase2(dt, ctx) {
    let s = bgState.phase2;
    let grad = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
    grad.addColorStop(0, "#0a1a0a");
    grad.addColorStop(1, "#1a2a1a");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

    s.mists.forEach(m => {
        m.a += m.speed * dt;
        let ox = Math.cos(m.a) * 40, oy = Math.sin(m.a) * 40;
        let mGrad = ctx.createRadialGradient(m.x + ox, m.y + oy, 0, m.x + ox, m.y + oy, m.r);
        mGrad.addColorStop(0, "rgba(50, 255, 100, 0.2)");
        mGrad.addColorStop(1, "rgba(50, 255, 100, 0)");
        ctx.fillStyle = mGrad;
        ctx.beginPath(); ctx.arc(m.x + ox, m.y + oy, m.r, 0, Math.PI*2); ctx.fill();
    });

    ctx.save();
    for(let i=0; i<5; i++) {
        ctx.beginPath();
        let yOffset = 150 + i * 120;
        ctx.moveTo(0, yOffset + Math.sin(bgState.time * 1.5 + i) * 100);
        for(let x=0; x<=CONFIG.width; x+=40) {
            ctx.lineTo(x, yOffset + Math.sin(bgState.time * (0.8+i*0.1) + x*0.015) * 100);
        }
        ctx.lineTo(CONFIG.width, CONFIG.height);
        ctx.lineTo(0, CONFIG.height);
        let aGrad = ctx.createLinearGradient(0, yOffset-100, 0, yOffset+200);
        aGrad.addColorStop(0, "rgba(100, 255, 150, 0)");
        aGrad.addColorStop(0.5, `rgba(100, 255, 150, ${0.15 + i*0.04})`);
        aGrad.addColorStop(1, "rgba(100, 255, 150, 0)");
        ctx.fillStyle = aGrad;
        ctx.fill();
    }
    ctx.restore();

    ctx.strokeStyle = "rgba(150, 255, 200, 0.4)";
    ctx.lineWidth = 1.5;
    s.starTrails.forEach(st => {
        st.y += st.speed * dt;
        if(st.y > CONFIG.height + st.length) { st.y = -st.length; st.x = Math.random() * CONFIG.width; }
        ctx.beginPath(); ctx.moveTo(st.x, st.y); ctx.lineTo(st.x, st.y - st.length); ctx.stroke();
    });

    s.particles.forEach(p => {
        let alpha = (Math.sin(bgState.time * 3 + p.phase) + 1) / 2;
        ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${alpha})`;
        ctx.fillRect(p.x, p.y, 2.5, 2.5);
    });
}

function drawPhase3(dt, ctx) {
    let s = bgState.phase3;
    let grad = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
    grad.addColorStop(0, "#1a1a00");
    grad.addColorStop(1, "#3a2a00");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

    ctx.fillStyle = "rgba(255, 200, 50, 0.5)";
    s.dusts.forEach(d => {
        d.x += d.vx * dt; d.y += d.vy * dt;
        if(d.x < 0) d.x += CONFIG.width; if(d.x > CONFIG.width) d.x -= CONFIG.width;
        if(d.y < 0) d.y += CONFIG.height; if(d.y > CONFIG.height) d.y -= CONFIG.height;
        ctx.fillRect(d.x, d.y, 2, 2);
    });

    ctx.fillStyle = "rgba(255, 215, 0, 0.25)";
    s.clouds.forEach(c => {
        c.x += c.vx * dt;
        if(c.x - c.w > CONFIG.width) c.x = -c.w;
        ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w, c.h, 0, 0, Math.PI*2); ctx.fill();
    });

    ctx.strokeStyle = "rgba(255, 220, 100, 0.3)";
    ctx.lineWidth = 4;
    s.rings.forEach(r => {
        r.angle += r.speed * dt;
        ctx.save();
        ctx.translate(r.x, r.y);
        ctx.rotate(r.angle);
        ctx.scale(1, 0.3); 
        ctx.beginPath(); ctx.arc(0, 0, r.r, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    });

    s.stars.forEach(p => {
        let alpha = (Math.sin(bgState.time * p.speed + p.phase) + 1) / 2;
        ctx.fillStyle = `rgba(255, 255, 150, ${alpha})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
    });
}

function drawPhase4(dt, ctx) {
    let s = bgState.phase4;
    let grad = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
    grad.addColorStop(0, "#1a0a00");
    grad.addColorStop(0.5, "#4a1a00");
    grad.addColorStop(1, "#ff3300"); 
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

    s.flares.forEach(f => {
        let pulse = (Math.sin(bgState.time * 2 + f.phase) + 1) / 2;
        let r = f.baseR + pulse * 20;
        let alpha = 0.2 + pulse * 0.3;
        let fGrad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
        fGrad.addColorStop(0, `rgba(255, 50, 0, ${alpha})`);
        fGrad.addColorStop(1, "rgba(255, 50, 0, 0)");
        ctx.fillStyle = fGrad;
        ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
    });

    ctx.fillStyle = "rgba(100, 100, 100, 0.7)";
    s.ashes.forEach(a => {
        a.x -= a.vx * dt; a.y += a.vy * dt;
        if(a.x < 0) { a.x = CONFIG.width; a.y = Math.random() * CONFIG.height; }
        if(a.y > CONFIG.height) { a.y = 0; a.x = Math.random() * CONFIG.width; }
        ctx.fillRect(a.x, a.y, a.s, a.s);
    });

    s.sparks.forEach(sp => {
        sp.x += sp.vx * dt; sp.y += sp.vy * dt;
        sp.life -= dt * 0.5;
        if(sp.life <= 0 || sp.y < 0 || sp.x < 0 || sp.x > CONFIG.width) {
            sp.x = Math.random() * CONFIG.width; sp.y = CONFIG.height; sp.life = 1.0;
        }
        ctx.fillStyle = `rgba(255, 200, 50, ${sp.life})`;
        ctx.fillRect(sp.x, sp.y, 3, 3);
    });
}

function generateLightning(sx, sy) {
    let path = [{x: sx, y: sy}];
    let cx = sx, cy = sy;
    while(cy < CONFIG.height) {
        cx += (Math.random() - 0.5) * 80; 
        cy += Math.random() * 50 + 30;
        path.push({x: cx, y: cy});
    }
    return path;
}

function drawPhase5(dt, ctx) {
    let s = bgState.phase5;
    let grad = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
    grad.addColorStop(0, "#000000");
    grad.addColorStop(1, "#3a0000"); 
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

    let lavaAlpha = 0.5 + Math.sin(bgState.time * 5) * 0.2;
    let lGrad = ctx.createLinearGradient(0, CONFIG.height - 200, 0, CONFIG.height);
    lGrad.addColorStop(0, "rgba(255, 50, 0, 0)");
    lGrad.addColorStop(1, `rgba(255, 50, 0, ${lavaAlpha})`);
    ctx.fillStyle = lGrad;
    ctx.fillRect(0, CONFIG.height - 200, CONFIG.width, 200);

    if(Math.random() < 0.05) {
        s.explosions.push({x: Math.random()*CONFIG.width, y: CONFIG.height - Math.random()*100, r: 10, maxR: Math.random()*50+30, life: 1.0});
    }
    for(let i=s.explosions.length-1; i>=0; i--) {
        let ex = s.explosions[i];
        ex.r += 100 * dt;
        ex.life -= dt * 2;
        if(ex.life <= 0) { s.explosions.splice(i, 1); continue; }
        let eGrad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, ex.r);
        eGrad.addColorStop(0, `rgba(255, 200, 100, ${ex.life})`);
        eGrad.addColorStop(1, "rgba(255, 50, 0, 0)");
        ctx.fillStyle = eGrad;
        ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2); ctx.fill();
    }

    s.smokes.forEach(sm => {
        sm.y += sm.vy * dt;
        if(sm.y < -sm.r) { sm.y = CONFIG.height + sm.r; sm.x = Math.random() * CONFIG.width; }
        ctx.fillStyle = "rgba(10, 0, 0, 0.7)";
        ctx.beginPath(); ctx.arc(sm.x, sm.y, sm.r, 0, Math.PI*2); ctx.fill();
    });

    s.embers.forEach(e => {
        e.x += e.vx * dt; e.y += e.vy * dt;
        if(e.y < 0) { e.y = CONFIG.height; e.x = Math.random() * CONFIG.width; }
        ctx.fillStyle = Math.random() > 0.5 ? "rgba(255, 100, 0, 0.9)" : "rgba(255, 50, 0, 0.9)";
        ctx.fillRect(e.x, e.y, e.s, e.s);
    });

    if(Math.random() < 0.04) {
        let startX = Math.random() * CONFIG.width;
        s.lightnings.push({x: startX, y: 0, life: 0.15, path: generateLightning(startX, 0), width: Math.random()*3+1});
    }
    
    for(let i=s.lightnings.length-1; i>=0; i--) {
        let l = s.lightnings[i];
        l.life -= dt;
        if(l.life <= 0) { s.lightnings.splice(i, 1); continue; }
        
        ctx.strokeStyle = `rgba(255, 255, 255, ${l.life * 6})`; 
        ctx.lineWidth = l.width;
        ctx.beginPath();
        ctx.moveTo(l.path[0].x, l.path[0].y);
        for(let j=1; j<l.path.length; j++) ctx.lineTo(l.path[j].x, l.path[j].y);
        ctx.stroke();
        
        ctx.fillStyle = `rgba(255, 255, 255, ${l.life})`;
        ctx.fillRect(0,0,CONFIG.width,CONFIG.height);
    }
}

function updateAndDrawBackground(dt, ctx) {
    if (!bgInitialized) {
        initBackgrounds(CONFIG.width, CONFIG.height);
        bgInitialized = true;
    }
    bgState.time += dt;

    if (gameState === 'menu' || gameState === 'practice_menu' || gameState === 'gameover' || gameState === 'clear' || gameState === 'loading') {
        let grad = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
        grad.addColorStop(0, "#000B18");
        grad.addColorStop(1, "#001B3A");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
        return;
    }

    let phase = isGokusaiBattle ? 5 : getBossPhase();
    if (phase === 1) drawPhase1(dt, ctx);
    else if (phase === 2) drawPhase2(dt, ctx);
    else if (phase === 3) drawPhase3(dt, ctx);
    else if (phase === 4) drawPhase4(dt, ctx);
    else if (phase === 5) drawPhase5(dt, ctx);
}
